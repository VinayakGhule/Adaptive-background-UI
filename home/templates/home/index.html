<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Textbox</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; }
        body { 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Layered background system for smooth transitions */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }
        
        #bg-layer1 {
            opacity: 1;
            background: linear-gradient(135deg, #92bfff 0%, #bc6ff1 25%, #92bfff 50%, #dda0dd 75%, #92bfff 100%);
        }
        
        #bg-layer2 {
            opacity: 0;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card {
            background: #fff;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <!-- Layered background system -->
    <div class="bg-layer" id="bg-layer1"></div>
    <div class="bg-layer" id="bg-layer2"></div>
    
    <div class="card p-4 shadow rounded" style="max-width: 520px; width: 92vw;">
        {% csrf_token %}
        <h1 class="mb-3 fs-4 fw-semibold text-dark">Enter text</h1>
        <div class="d-flex flex-column gap-1 small text-muted mb-2">
            <div class="d-flex gap-3">
                <strong class="text-dark">Live Stats:</strong>
                <div><span id="wordCount">0</span> words</div>
                <div><span id="charCount">0</span> chars</div>
                <div class="ms-auto">⏱ <span id="elapsed">0.0</span>s</div>
            </div>
            <div class="d-flex gap-3">
                <strong class="text-dark">Last 20s:</strong>
                <div><span id="wpm20">0</span> WPM</div>
                <div><span id="cpm20">0</span> CPM</div>
            </div>
            <div class="d-flex gap-3">
                <strong class="text-dark">Overall:</strong>
                <div><span id="wpm">0</span> WPM</div>
                <div><span id="cpm">0</span> CPM</div>
            </div>
        </div>
        <textarea id="typing-area" class="form-control form-control-lg" rows="6" placeholder="Start typing..." spellcheck="false"></textarea>
        
        <!-- Sentiment Analysis Display -->
        <div id="sentiment-section" class="mt-3 p-3 bg-light rounded" style="display: none;">
            <h6 class="mb-2 text-dark">📊 Sentiment Analysis</h6>
            <div class="row g-2">
                <div class="col-6">
                    <div class="text-center">
                        <div class="small text-muted">Overall Sentiment</div>
                        <div id="sentimentLabel" class="badge bg-secondary fs-6">Neutral</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="text-center">
                        <div class="small text-muted">Confidence</div>
                        <div id="sentimentScore" class="fw-bold">0.0</div>
                    </div>
                </div>
            </div>
            <div class="mt-2">
                <div class="small text-muted mb-1">Sentiment Breakdown:</div>
                <div class="d-flex justify-content-between small">
                    <span>Positive: <span id="posScore">0%</span></span>
                    <span>Neutral: <span id="neuScore">0%</span></span>
                    <span>Negative: <span id="negScore">0%</span></span>
                </div>
            </div>
        </div>
        
        <div class="d-flex justify-content-between mt-2">
            <button id="reset" class="btn btn-outline-secondary btn-sm">Reset</button>
        </div>
    </div>
    <!-- Bootstrap JS Bundle (optional, for interactive components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mood-based gradient arrays for different sentiments
        const moodGradients = {
            positive: [
                'linear-gradient(135deg, #a8e6cf 0%, #88d8c0 25%, #7fcdcd 50%, #6bb6ff 75%, #a8e6cf 100%)',
                'linear-gradient(135deg, #b8f6df 0%, #98e8d0 25%, #8fdddd 50%, #7bc6ff 75%, #b8f6df 100%)',
                'linear-gradient(135deg, #c8ffe9 0%, #a8f8e0 25%, #9feddd 50%, #8bd6ff 75%, #c8ffe9 100%)',
                'linear-gradient(135deg, #d8fff9 0%, #b8f8f0 25%, #affded 50%, #9be6ff 75%, #d8fff9 100%)'
            ],
            negative: [
                'linear-gradient(135deg, #2c3e50 0%, #34495e 25%, #2c3e50 50%, #1a252f 75%, #2c3e50 100%)',
                'linear-gradient(135deg, #1a252f 0%, #2c3e50 25%, #1a252f 50%, #0f1419 75%, #1a252f 100%)',
                'linear-gradient(135deg, #0f1419 0%, #1a252f 25%, #0f1419 50%, #0a0d10 75%, #0f1419 100%)',
                'linear-gradient(135deg, #0a0d10 0%, #0f1419 25%, #0a0d10 50%, #050708 75%, #0a0d10 100%)'
            ],
            neutral: [
                'linear-gradient(135deg, #92bfff 0%, #bc6ff1 25%, #92bfff 50%, #dda0dd 75%, #92bfff 100%)',
                'linear-gradient(135deg, #a2cfff 0%, #ccd1ff 25%, #a2cfff 50%, #edb0ed 75%, #a2cfff 100%)',
                'linear-gradient(135deg, #b2dfff 0%, #dce1ff 25%, #b2dfff 50%, #fdc0fd 75%, #b2dfff 100%)',
                'linear-gradient(135deg, #c2efff 0%, #ecf1ff 25%, #c2efff 50%, #fdd0fd 75%, #c2efff 100%)'
            ]
        };
        
        // Layered background transition system
        let currentMood = 'neutral';
        let currentGradientIndex = 0;
        let showingLayer1 = true;
        
        // Set initial background from Django context
        const initialBackground = '{{ background|default:"linear-gradient(135deg, #92bfff 0%, #bc6ff1 100%)" }}';
        
        // Determine initial mood and set appropriate gradient
        if (initialBackground.includes('#a8e6cf')) {
            currentMood = 'positive';
        } else if (initialBackground.includes('#2c3e50')) {
            currentMood = 'negative';
        }
        
        // Set initial background on page load
        setTimeout(() => {
            if (currentMood !== 'neutral') {
                const layer1 = document.getElementById('bg-layer1');
                const intensity = 0.5; // Default intensity for initial load
                const gradientIndex = Math.min(Math.floor(intensity * 4), 3);
                layer1.style.background = moodGradients[currentMood][gradientIndex];
            }
        }, 100);
        
        // Get CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        (function () {
            const area = document.getElementById('typing-area');
            const wpmEl = document.getElementById('wpm');
            const cpmEl = document.getElementById('cpm');
            const wpm20El = document.getElementById('wpm20');
            const cpm20El = document.getElementById('cpm20');
            const elapsedEl = document.getElementById('elapsed');
            const wordCountEl = document.getElementById('wordCount');
            const charCountEl = document.getElementById('charCount');
            const resetBtn = document.getElementById('reset');
            
            // Sentiment analysis elements
            const sentimentSection = document.getElementById('sentiment-section');
            const sentimentLabel = document.getElementById('sentimentLabel');
            const sentimentScore = document.getElementById('sentimentScore');
            const posScore = document.getElementById('posScore');
            const neuScore = document.getElementById('neuScore');
            const negScore = document.getElementById('negScore');

            let startTime = null;
            let timerId = null;
            let liveTimerId = null;
            let lastSnapshotTime = null;
            let lastSnapshotChars = 0;

            function getElapsedSeconds() {
                if (!startTime) return 0;
                return (Date.now() - startTime) / 1000;
            }

            function normalizedCharCount() {
                const text = area.value;
                return text.replace(/\s+/g, ' ').trim().length;
            }

            function getWordCount() {
                const text = area.value.trim();
                if (!text) return 0;
                // Split by whitespace and filter out empty strings
                return text.split(/\s+/).filter(word => word.length > 0).length;
            }

            function getCharCount() {
                return area.value.length;
            }

            function updateLiveStats() {
                const wordCount = getWordCount();
                const charCount = getCharCount();
                
                wordCountEl.textContent = wordCount;
                charCountEl.textContent = charCount;
            }

            async function analyzeSentiment() {
                const text = area.value.trim();
                if (!text) {
                    sentimentSection.style.display = 'none';
                    return;
                }

                try {
                    const response = await fetch('/analyze-sentiment/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify({ text: text })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        updateSentimentDisplay(data);
                        sentimentSection.style.display = 'block';
                    } else {
                        console.error('Sentiment analysis failed:', response.statusText);
                    }
                } catch (error) {
                    console.error('Error analyzing sentiment:', error);
                }
            }

            function updateSentimentDisplay(data) {
                // Update overall sentiment
                const sentiment = data.sentiment;
                sentimentLabel.textContent = sentiment.charAt(0).toUpperCase() + sentiment.slice(1);
                
                // Update sentiment badge color
                sentimentLabel.className = 'badge fs-6';
                if (sentiment === 'positive') {
                    sentimentLabel.classList.add('bg-success');
                } else if (sentiment === 'negative') {
                    sentimentLabel.classList.add('bg-danger');
                } else {
                    sentimentLabel.classList.add('bg-secondary');
                }
                
                // Update confidence score
                sentimentScore.textContent = Math.abs(data.scores.compound).toFixed(2);
                
                // Update breakdown percentages
                posScore.textContent = Math.round(data.scores.pos * 100) + '%';
                neuScore.textContent = Math.round(data.scores.neu * 100) + '%';
                negScore.textContent = Math.round(data.scores.neg * 100) + '%';
                
                // Update background gradient based on sentiment
                updateBackgroundGradient(sentiment, data.scores.compound);
            }

            // Layered background transition function (inspired by the reference file)
            function changeBackgroundLayered(sentiment, compoundScore) {
                // Only change if mood actually changed
                if (sentiment === currentMood) {
                    return;
                }
                
                const layer1 = document.getElementById('bg-layer1');
                const layer2 = document.getElementById('bg-layer2');
                
                // Calculate intensity-based gradient selection
                const intensity = Math.abs(compoundScore);
                const gradientIndex = Math.min(Math.floor(intensity * 4), 3);
                
                // Get the appropriate gradient for the new mood
                const newGradient = moodGradients[sentiment][gradientIndex];
                
                if (showingLayer1) {
                    // Fade in layer2 with new gradient
                    layer2.style.background = newGradient;
                    layer2.style.opacity = 1;
                    layer1.style.opacity = 0;
                } else {
                    // Fade in layer1 with new gradient
                    layer1.style.background = newGradient;
                    layer1.style.opacity = 1;
                    layer2.style.opacity = 0;
                }
                
                // Switch layers for next transition
                showingLayer1 = !showingLayer1;
                currentMood = sentiment;
                currentGradientIndex = gradientIndex;
            }
            
            // Legacy function for compatibility (now uses layered system)
            function updateBackgroundGradient(sentiment, compoundScore) {
                changeBackgroundLayered(sentiment, compoundScore);
            }
            
            // Color interpolation function for smooth transitions
            function interpolateColor(color1, color2, factor) {
                // Convert hex to RGB
                const hex1 = color1.replace('#', '');
                const hex2 = color2.replace('#', '');
                
                const r1 = parseInt(hex1.substr(0, 2), 16);
                const g1 = parseInt(hex1.substr(2, 2), 16);
                const b1 = parseInt(hex1.substr(4, 2), 16);
                
                const r2 = parseInt(hex2.substr(0, 2), 16);
                const g2 = parseInt(hex2.substr(2, 2), 16);
                const b2 = parseInt(hex2.substr(4, 2), 16);
                
                // Interpolate
                const r = Math.round(r1 + (r2 - r1) * factor);
                const g = Math.round(g1 + (g2 - g1) * factor);
                const b = Math.round(b1 + (b2 - b1) * factor);
                
                // Convert back to hex
                return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
            }


            function tickEvery20s() {
                const now = Date.now();
                const totalChars = normalizedCharCount();

                if (lastSnapshotTime === null) {
                    lastSnapshotTime = now;
                    lastSnapshotChars = totalChars;
                }

                // Last interval metrics
                const deltaSeconds = Math.max((now - lastSnapshotTime) / 1000, 0.001);
                const deltaMinutes = deltaSeconds / 60;
                const deltaChars = Math.max(totalChars - lastSnapshotChars, 0);
                const cpm20 = Math.round(deltaChars / deltaMinutes || 0);
                const wpm20 = Math.round((deltaChars / 5) / deltaMinutes || 0);

                cpm20El.textContent = isFinite(cpm20) ? cpm20 : 0;
                wpm20El.textContent = isFinite(wpm20) ? wpm20 : 0;

                // Overall metrics
                const elapsedSeconds = Math.max(getElapsedSeconds(), 0.001);
                const minutes = elapsedSeconds / 60;
                const cpm = Math.round(totalChars / minutes || 0);
                const wpm = Math.round((totalChars / 5) / minutes || 0);

                cpmEl.textContent = isFinite(cpm) ? cpm : 0;
                wpmEl.textContent = isFinite(wpm) ? wpm : 0;
                elapsedEl.textContent = elapsedSeconds.toFixed(1);

                // Analyze sentiment every 20 seconds
                analyzeSentiment();

                // Move snapshot window forward
                lastSnapshotTime = now;
                lastSnapshotChars = totalChars;
            }

            function startTimerIfNeeded() {
                if (startTime) return;
                startTime = Date.now();
                // First snapshot occurs after 20 seconds, then every 20 seconds
                timerId = setInterval(tickEvery20s, 20000);
                // Update elapsed time every 100ms for smooth display
                liveTimerId = setInterval(() => {
                    elapsedEl.textContent = getElapsedSeconds().toFixed(1);
                }, 100);
            }

            function reset() {
                area.value = '';
                startTime = null;
                clearInterval(timerId);
                clearInterval(liveTimerId);
                timerId = null;
                liveTimerId = null;
                lastSnapshotTime = null;
                lastSnapshotChars = 0;
                wpmEl.textContent = '0';
                cpmEl.textContent = '0';
                wpm20El.textContent = '0';
                cpm20El.textContent = '0';
                elapsedEl.textContent = '0.0';
                wordCountEl.textContent = '0';
                charCountEl.textContent = '0';
                sentimentSection.style.display = 'none';
                
                // Reset background to default neutral gradient using layered system
                changeBackgroundLayered('neutral', 0);
                
                area.focus();
            }

            area.addEventListener('input', () => {
                startTimerIfNeeded();
                updateLiveStats(); // Update live word and character count immediately
                // WPM/CPM updates happen at 20s intervals
            });
            resetBtn.addEventListener('click', reset);
        })();
    </script>
</body>
</html>
